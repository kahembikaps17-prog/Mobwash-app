<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Subscription | MobWash</title>
    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css/global.css" />
    <link rel="stylesheet" href="css/styles.css/active-subscription.css" />
  </head>
  <body class="hub-body">
    <header class="executive-header">
      <div
        class="header-nav-top"
        style="
          display: flex;
          justify-content: space-between;
          align-items: center;
          padding: 45px 24px 20px;
        "
      >
        <a href="profile.html" class="action-circle"
          ><i class="bx bx-chevron-left"></i
        ></a>
        <h1 class="page-title" style="font-size: 1.2rem; font-weight: 800">
          Active Subscription
        </h1>
        <div style="width: 44px"></div>
      </div>
    </header>

    <main class="sub-container animated-up">
      
      <div id="setup-section" style="display: none; padding: 20px; background: rgba(37, 99, 235, 0.1); border-radius: 20px; margin-bottom: 20px;">
        <h3 style="color: var(--text-main); margin-bottom: 10px;">Welcome! Set up your Hub</h3>
        <input type="text" id="name-input" placeholder="Enter Full Name" style="width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: none;">
        <button id="save-btn" class="btn-manage" style="margin-top: 0;">Save My Details</button>
      </div>

      <div id="dashboard-section" style="display: none;">
        <div class="member-card-visual">
          <div class="card-glass-overlay"></div>
          <div class="card-content">
            <div class="card-top">
              <span class="brand-name">MOBWASH <span>EXECUTIVE</span></span>
              <i class="bx bxs-chip"></i>
            </div>
            <div class="card-middle">
              <span class="member-name" id="display-name">Loading...</span>
            </div>
            <div class="card-bottom">
              <div class="stat">
                <small>Status</small>
                <strong>Active</strong>
              </div>
              <div class="stat">
                <small>Next Billing</small>
                <strong id="display-date">--</strong>
              </div>
            </div>
          </div>
        </div>

        <section class="plan-details">
          <div class="section-title">Current Plan</div>
          <div class="glass-card-blue">
            <div class="plan-info">
              <h3 id="display-plan">Loading Plan...</h3>
              <p id="display-price">--</p>
            </div>
            <span class="plan-badge">Best Value</span>
          </div>
        </section>

        <a href="payments.html">
          <button class="btn-manage">Manage Payment Methods</button>
        </a>
        <p class="cancel-link" id="reset-btn" style="cursor: pointer;">Reset / Clear Data</p>
      </div>
    </main>
    <script src="js/global.js"></script>
    <script type="module" src="js/maintenance-check.js"></script>
    <script type="module" src="js/session.js"></script>

    <script>
  document.addEventListener("DOMContentLoaded", () => {
    // 1. Grab our sections and elements
    const setupSection = document.getElementById("setup-section");
    const dashboardSection = document.getElementById("dashboard-section");
    
    const displayName = document.getElementById("display-name");
    const displayPlan = document.getElementById("display-plan");
    const displayPrice = document.getElementById("display-price");
    const displayDate = document.getElementById("display-date");

    // 2. Function to check data and update UI
    function loadUserData() {
      // Look in the browser's local storage for our user
      const savedUser = JSON.parse(localStorage.getItem("mobwash_user"));

      if (savedUser) {
        // USER EXISTS: Hide setup, show dashboard, and inject data!
        setupSection.style.display = "none";
        dashboardSection.style.display = "block";

        displayName.textContent = savedUser.name;
        displayPlan.textContent = savedUser.plan;
        displayPrice.textContent = savedUser.price;
        displayDate.textContent = savedUser.billingDate;
      } else {
        // NO USER: Hide dashboard, show the setup form
        dashboardSection.style.display = "none";
        setupSection.style.display = "block";
      }
    }

    // 3. Handle saving new data
    document.getElementById("save-btn").addEventListener("click", () => {
      const nameValue = document.getElementById("name-input").value;
      
      if(nameValue.trim() === "") {
        alert("Please enter a name.");
        return;
      }

      // Create a new user object (Hardcoding the plan details for this example)
      const newUser = {
        name: nameValue,
        plan: "Executive Tier",
        price: "K 150.00 / month",
        billingDate: "April 01, 2026" // You can make this dynamic later
      };

      // Save it to localStorage
      localStorage.setItem("mobwash_user", JSON.stringify(newUser));
      
      // Reload the UI
      loadUserData();
    });

    // 4. Handle resetting data (just for testing purposes)
    document.getElementById("reset-btn").addEventListener("click", () => {
      localStorage.removeItem("mobwash_user");
      loadUserData();
    });

    // Run this function the moment the page loads
    loadUserData();
  });
</script>
  </body>
</html>
